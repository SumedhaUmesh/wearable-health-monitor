# Build Zephyr firmware on every push and PR to main/develop.
# Requires this repo's west.yml (Zephyr v3.7.0) plus the Zephyr SDK below.

name: Firmware CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: firmware-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZEPHYR_SDK_VERSION: "0.16.8"
  # Matches west.yml — update together when bumping Zephyr.
  ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyr-sdk-0.16.8

jobs:
  build-qemu-cortex-m3:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ github.workspace }}
        shell: bash

    steps:
      - name: Checkout application (manifest repo)
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget curl \
            python3-dev python3-pip python3-setuptools python3-wheel xz-utils file make \
            gcc gcc-multilib libsdl2-dev libmagic1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # One shell: west on PATH, same cwd, resolve Zephyr path (do not assume ./zephyr).
      - name: Install west, fetch Zephyr, install Python requirements
        run: |
          set -euxo pipefail
          cd "${GITHUB_WORKSPACE}"
          pip install west
          west --version
          west init -l .
          west update
          echo "West topdir: $(west topdir)"
          ls -la
          west list
          ZEPHYR_SRC="$(west list -f '{posixpath}' zephyr)"
          echo "Zephyr project path: ${ZEPHYR_SRC}"
          test -f "${ZEPHYR_SRC}/scripts/requirements.txt"
          pip install -r "${ZEPHYR_SRC}/scripts/requirements.txt"

      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.ZEPHYR_SDK_INSTALL_DIR }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-linux-x86_64

      - name: Download and install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -eux
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz"
          tar xf "zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz"
          rm -f "zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz"
          "./zephyr-sdk-${ZEPHYR_SDK_VERSION}/setup.sh" -t arm-zephyr-eabi -h -c

      - name: Export Zephyr CMake package registry
        run: west zephyr-export

      - name: Build for qemu_cortex_m3
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          west build -b qemu_cortex_m3 -d build .

      - name: Upload firmware artifact (ELF)
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-qemu-cortex-m3
          path: build/zephyr/zephyr.elf
          if-no-files-found: error

  host-unit-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}
        shell: bash
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++

      - name: Configure, build, and run host tests
        run: |
          set -euxo pipefail
          cmake -S tests -B build-tests -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-tests -j 2
          ctest --test-dir build-tests --output-on-failure
